# Brick 3-03 tmux dashboard (assumes session HUD already exists)
set -g status off
set -g mouse on

# Pane 0: combined HUD
send-keys -t HUD:0.0 "watch -n 1 ./interface/hud/hud_render.sh" C-m

# Pane 1: tools
split-window -h -t HUD:0.0
send-keys -t HUD:0.1 "watch -n 2 ./interface/hud/hud_tools.sh" C-m

# Pane 2: net
select-pane -t HUD:0.0
split-window -v -t HUD:0.0
send-keys -t HUD:0.2 "watch -n 2 ./interface/hud/hud_net.sh" C-m

# Pane 3: status
select-pane -t HUD:0.1
split-window -v -t HUD:0.1
send-keys -t HUD:0.3 "watch -n 2 ./interface/hud/hud_status.sh" C-m

select-pane -t HUD:0.0
